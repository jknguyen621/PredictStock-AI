<!DOCTYPE html>
<html>
<head>
    <title>AI Stock Predictor</title>
</head>
<body>
    <h1>AI Stock Predictor</h1>
    <form action="/predict" method="post">
        <label for="ticker">Ticker Symbol:</label>
        <input type-="text" id="ticker" name="ticker"><br><br>
        <label for="past_weeks">Past Weeks:</label>
        <input type="number" id="past_weeks" name="past_weeks" min="1"><br><br>
        <label for="future_weeks">Future Weeks:</label>
        <input type="number" id="future_weeks" name="future_weeks" min="1" max="3"><br><br>
        <input type="submit" value="Predict">
    </form>
    {% if prediction %}
    <h2>Prediction for {{ ticker }}</h2>
    <p>{{ prediction }}</p>
    {% endif %}
</body>
</html>
